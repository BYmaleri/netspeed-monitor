name: 🚀 Build & Release

# v1.0.0 gibi bir tag push'landığında otomatik çalışır
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # release oluşturmak için

jobs:
  build:
    name: Build Setup.exe on Windows
    runs-on: windows-latest

    steps:
      # ── 1. Kodu çek ──────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python kur ─────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # ── 3. Bağımlılıkları yükle ───────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 5. EXE derle ──────────────────────────────────────────────────
      - name: Build EXE with PyInstaller
        run: pyinstaller netspeed.spec

      # ── 6. Inno Setup kur ─────────────────────────────────────────────
      - name: Install Inno Setup 6
        run: choco install innosetup --yes --no-progress

      # ── 7. Installer oluştur ──────────────────────────────────────────
      - name: Compile installer
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc installer\setup.iss
        shell: pwsh

      # ── 8. Sürüm adını çek (v1.0.0 → 1.0.0) ─────────────────────────
      - name: Get version
        id: ver
        run: echo "tag=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
        shell: bash

      # ── 9. GitHub Release oluştur ve dosyayı yükle ───────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "NetSpeed Monitor v${{ steps.ver.outputs.tag }}"
          body: |
            ## 🖥️ NetSpeed Monitor v${{ steps.ver.outputs.tag }}

            Windows 11 görev çubuğu saatinin solunda anlık indirme/yükleme hızını gösterir.

            ### Kurulum
            1. `NetSpeedMonitor_Setup_v${{ steps.ver.outputs.tag }}.exe` dosyasını indir
            2. Çalıştır ve kurulumu tamamla
            3. Uygulama otomatik olarak başlar ve saatin soluna yapışır

            ### Gereksinimler
            - Windows 10 (20H1+) veya Windows 11
            - Yönetici yetkisi **gerekmez**
          draft: false
          prerelease: false
          files: installer/output/NetSpeedMonitor_Setup_v*.exe
